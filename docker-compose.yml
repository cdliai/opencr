# Two profiles ship out of the box:
#
#   docker compose --profile gpu up -d   # production: vLLM model server + pipeline (NVIDIA)
#   docker compose --profile cpu up -d   # CPU/Mac: pipeline only, in-process transformers backend
#
# Without an explicit --profile, no services run. Always pick one.

services:
  ocr-model:
    profiles: ["gpu"]
    build: ./ocr-model
    runtime: nvidia
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "127.0.0.1:39671:39671"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:39671/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

  ocr-pipeline:
    profiles: ["gpu"]
    build: ./ocr_pipeline
    restart: unless-stopped
    ports:
      - "39672:39672"
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    environment:
      - MODEL_BACKEND=vllm
      - MODEL_SERVER_URL=http://ocr-model:39671
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
    depends_on:
      ocr-model:
        condition: service_healthy

  ocr-pipeline-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: ocr_pipeline/Dockerfile.cpu
    restart: unless-stopped
    ports:
      - "39672:39672"
    volumes:
      - ./input:/data/input
      - ./output:/data/output
      - hf-cache:/root/.cache/huggingface
    environment:
      - MODEL_BACKEND=local
      - LOCAL_DEVICE=cpu
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - HF_HOME=/root/.cache/huggingface

volumes:
  hf-cache:
